name: Daily Data Update

on:
  schedule:
    - cron: '0 14 * * *'   # 22:00 CST，每天增量更新
    - cron: '0 14 * * 0'   # 22:00 CST，每周日全量刷新用户画像
  workflow_dispatch:
    inputs:
      full_refresh:
        description: '是否全量刷新用户画像（清空 user_profiles.json）'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 每天清除：repos、stars、mrs、issues、聚合文件
      # user_profiles.json 默认保留（仅增量追加新用户）
      # 手动触发时可选择全量刷新用户画像
      - name: Clear stale caches
        run: |
          rm -f data/repos.json
          rm -f data/org_timeline.json
          rm -f data/weekly_activity.json
          rm -rf data/stars/
          rm -rf data/mrs/
          rm -rf data/issues/
          if [ "${{ github.event.inputs.full_refresh }}" = "true" ] || \
             [ "${{ github.event.schedule }}" = "0 14 * * 0" ]; then
            echo "全量刷新：清除 user_profiles.json"
            rm -f data/user_profiles.json
          fi

      - name: Collect repos
        run: python collector.py repos

      - name: Collect stars
        run: python collector.py stars

      - name: Collect new user profiles
        run: python collector.py users

      - name: Collect issue details
        run: python collector.py issues

      - name: Collect MR details
        run: python collector.py mrs

      - name: Collect activity authors
        run: python collector.py activities

      - name: Reclassify users
        run: python collector.py reclassify

      - name: Generate overview timeline
        run: python collector.py overview

      - name: Generate slim user data
        run: python collector.py users-slim

      - name: Generate issue summary
        run: python collector.py issue-summary

      - name: Generate MR summary
        run: python collector.py mr-summary

      - name: Generate weekly activity
        run: python collector.py weekly

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "chore: 自动更新数据 $(date -u '+%Y-%m-%d')"
            git push
          )
